name: CI/CD — Build Frontend & Deploy to App Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_frontend:
    name: Build front-end
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install front-end deps
        run: |
          cd front-end
          npm ci

      - name: Build front-end
        run: |
          cd front-end
          npm run build

      - name: Upload `dist` artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: front-end/dist

  deploy:
    name: Deploy to App Engine
    runs-on: ubuntu-latest
    needs: build_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download front-end artifact into back-end/dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: back-end/dist

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: (Optional) Install backend deps and build
        run: |
          if [ -f back-end/package.json ]; then
            npm --prefix back-end ci --production
          fi

      - name: Deploy to App Engine
        run: |
          cd back-end
          gcloud app deploy --quiet
